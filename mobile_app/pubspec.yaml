name: mobile_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  fl_chart: ^0.66.2
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  go_router: ^13.2.0
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^10.0.0
  local_auth: ^2.2.0
  url_launcher: ^6.2.5
  logger: ^2.0.2
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  app_links: ^3.4.5
  flutter_web_auth_2: ^5.0.1
  workmanager: ^0.9.0+3
  image_picker: ^1.0.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0

# ✅ THIS MUST BE OUTSIDE dev_dependencies
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_2.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/app_icon_2.png